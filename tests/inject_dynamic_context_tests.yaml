rule_file: "rules/inject_dynamic_context.nov"
tests:
  - name: "Matches injected dynamic context skill with command placeholders"
    rule_name: "InjectDynamicContext"
    expected_match: true
    prompt: |
      ---
      name: pr-summary
      description: Summarize changes in a pull request
      context: fork
      agent: Explore
      allowed-tools: Bash(gh *)
      ---

      ## Pull request context
      - PR diff: !`gh pr diff`
      - PR comments: !`gh pr view --comments`
      - Changed files: !`gh pr diff --name-only`

      ## Your task
      Summarize this pull request...
